name: Update affiliate site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/keywords.csv'
      - 'data/indexnow.json'
      - '.github/workflows/update.yml'
  schedule:
    - cron: '0 21 * * 0'

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run update
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          SITE_URL: https://jigyousho-bousai.com
      - name: Publish generated files
        id: publish
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          cp -R dist/* .
          git add .
          if git diff --cached --quiet; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No changes"
          else
            git commit -m "Update generated affiliate pages"
            git push
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Request GitHub Pages build
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
      - name: Notify IndexNow
        if: steps.publish.outputs.published == 'true'
        run: node scripts/submit-indexnow.js
